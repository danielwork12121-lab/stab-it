<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>StabIt - Auth</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background-color: #000;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
}

#phone-canvas {
  width: min(100vw, 430px);
  aspect-ratio: 853/1844;
  background: url("/assets/auth/login-bg.png") 0 0/100% 100% no-repeat;
  position: relative;
}

.auth-form {
  position: relative;
  z-index: 10;
  width: 100%;
  height: 100%;
}

.auth-input {
  position: absolute;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-size: 16px;
  padding: 0 12px;
  z-index: 20;
  pointer-events: auto;
  touch-action: manipulation;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}

.auth-input:focus {
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.3);
}

.auth-input::placeholder {
  color: rgba(255, 255, 255, 0.6);
}

.auth-button {
  position: absolute;
  background: transparent;
  border: none;
  outline: none;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s ease;
  z-index: 20;
  pointer-events: auto;
  touch-action: manipulation;
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
}

.auth-button:active {
  transform: scale(0.985);
}

.auth-button.button-pressed {
  background: rgba(255,255,255,0.08);
  transform: scale(0.985);
  border-radius: 8px;
}

.auth-button::-moz-focus-inner {
  border: 0;
}

#username-input {
  left: 57px;
  top: 540px;
  width: 74.21%;
  height: 4.12%;
}

#password-input {
  left: 57px;
  top: 630px;
  width: 74.21%;
  height: 4.18%;
}

#login-button {
  left: 11.37%;
  top: 702px;
  width: 74.21%;
  height: 4.39%;
}

#register-button {
  left: 11.37%;
  top: 767px;
  width: 74.21%;
  height: 5.21%;
}

.validation-error {
  position: absolute;
  color: #ff4444;
  font-size: 12px;
  white-space: nowrap;
}

#username-error {
  left: 13.83%;
  top: 60.5%;
}

#password-error {
  left: 13.83%;
  top: 70.3%;
}

.hitbox-outline #username-input,
.hitbox-outline #password-input,
.hitbox-outline #login-button,
.hitbox-outline #register-button {
  outline: 2px solid #ff00ff;
  outline-offset: 2px;
}

.hitbox-label {
  position: absolute;
  color: #ff00ff;
  font-size: 10px;
  white-space: nowrap;
  pointer-events: none;
}

#home-screen {
  display: none;
  width: min(100vw, 430px);
  aspect-ratio: 853/1844;
  background: url("/assets/home/stuffy-home.JPG") 0 0/100% 100% no-repeat;
  position: relative;
}

.pain-dot {
  position: absolute;
  width: 8%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#home-message {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 14px;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
  opacity: 0;
  transition: opacity 0.3s ease;
}

#home-message.show {
  opacity: 1;
}

.body-zone-outline {
  position: absolute;
  border: 2px dashed #ff00ff;
  border-radius: 50%;
  pointer-events: none;
}

.body-zone-label {
  position: absolute;
  color: #ff00ff;
  font-size: 10px;
  white-space: nowrap;
  pointer-events: none;
}

#chat-screen {
  display: none;
  width: min(100vw, 430px);
  aspect-ratio: 853/1844;
  background: url("/assets/chat/chat-background.JPG") 0 0/100% 100% no-repeat;
  position: relative;
  opacity: 0;
  transition: opacity 0.4s ease;
}

#chat-screen.show {
  opacity: 1;
}

#chat-screen .pain-dot {
  position: absolute;
  width: 12%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

#auth-message {
  position: absolute;
  bottom: 7%;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  font-size: 14px;
  text-align: center;
  white-space: nowrap;
  text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
  z-index: 100;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
}

#auth-message.show {
  opacity: 1;
}

.chat-action-wrapper {
  display: flex;
  justify-content: center;
  margin: 12px 0;
}

.chat-review-choice-wrapper {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 12px 0;
  flex-wrap: wrap;
}

.chat-action-button {
  background: linear-gradient(135deg, #9c5de5 0%, #6e45e2 100%);
  color: #fff;
  border: none;
  border-radius: 24px;
  padding: 10px 28px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  box-shadow: 0 4px 12px rgba(108, 69, 226, 0.4);
}

.chat-action-button:active {
  transform: scale(0.96);
  box-shadow: 0 2px 6px rgba(108, 69, 226, 0.3);
}
</style>
</head>
<body>
<div id="phone-canvas">
  <form id="auth-form" class="auth-form">
    <input type="text" id="username-input" class="auth-input" placeholder="昵称" autocomplete="username">
    <div id="username-error" class="validation-error"></div>
    
    <input type="password" id="password-input" class="auth-input" placeholder="密码" autocomplete="current-password">
    <div id="password-error" class="validation-error"></div>
    
    <button type="button" id="login-button" class="auth-button"></button>
    <button type="button" id="register-button" class="auth-button"></button>
  </form>
  <div id="auth-message"></div>
</div>

<div id="home-screen">
  <div id="home-message"></div>
</div>

<div id="chat-screen"></div>

<script src="./js/config.js"></script>
<script src="./js/storage.js"></script>
<script src="./js/coords.js"></script>
<script src="./js/scenes.js"></script>
<script src="./js/chat.js"></script>
<script src="./js/auth.js"></script>
<script src="./js/audio.js"></script>
<script src="./js/main.js"></script>
<script src="./js/dev.js"></script>
</body>
</html>
